name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS
    runs-on: macos-15
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)

          version = cargo["package"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]

          if actual_tag != expected_tag:
              raise SystemExit(
                  f"tag {actual_tag!r} does not match Cargo.toml version {expected_tag!r}"
              )
          PY

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          if [ -z "$APPLE_API_KEY" ]; then
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Generate macOS packager config
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)

          version = cargo["package"]["version"]

          macos_lines = [
              "[macos]",
              'minimum-system-version = "12.0"',
          ]
          signing_identity = os.environ.get("APPLE_SIGNING_IDENTITY", "").strip()
          if signing_identity:
              macos_lines.append(f"signing-identity = {json.dumps(signing_identity)}")

          lines = [
              'name = "libemin"',
              'product-name = "Libemin"',
              f"version = {json.dumps(version)}",
              'identifier = "io.github.mattiabonanni.libemin"',
              'publisher = "Mattia Bonanni"',
              'description = "Native desktop helper for booking hours into Libemax"',
              'category = "Productivity"',
              'out-dir = "dist"',
              'binaries-dir = "target/release"',
              '[before-packaging-command]',
              'script = "cargo build --release"',
              f'dir = {json.dumps(os.environ["GITHUB_WORKSPACE"])}',
              'icons = ["assets/icon.png", "assets/icon.ico"]',
              '',
              '[[binaries]]',
              'path = "libemin"',
              'main = true',
              '',
              *macos_lines,
              '',
          ]

          config_path = Path(os.environ["GITHUB_WORKSPACE"]) / "packager-ci.toml"
          config_path.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Build macOS packages
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: cargo packager --config "$GITHUB_WORKSPACE/packager-ci.toml" --formats "app,dmg"

      - name: Archive macOS app bundle
        shell: bash
        run: |
          tar -C dist -czf "dist/Libemin_${GITHUB_REF_NAME}_macos-${RUNNER_ARCH}.tar.gz" "Libemin.app"

      - name: Upload macOS packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*macos-*.tar.gz

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)

          version = cargo["package"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]

          if actual_tag != expected_tag:
              raise SystemExit(
                  f"tag {actual_tag!r} does not match Cargo.toml version {expected_tag!r}"
              )
          PY

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Generate Windows packager config
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          with open("Cargo.toml", "rb") as fh:
              cargo = tomllib.load(fh)

          version = cargo["package"]["version"]

          windows_lines = [
              "[windows]",
              "allow-downgrades = false",
          ]
          thumbprint = os.environ.get("WINDOWS_CERTIFICATE_THUMBPRINT", "").strip()
          if thumbprint:
              windows_lines.append(f"certificate-thumbprint = {json.dumps(thumbprint)}")
          timestamp_url = os.environ.get("WINDOWS_TIMESTAMP_URL", "").strip()
          if timestamp_url:
              windows_lines.append(f"timestamp-url = {json.dumps(timestamp_url)}")
          sign_command = os.environ.get("WINDOWS_SIGN_COMMAND", "").strip()
          if sign_command:
              windows_lines.append(f"sign-command = {json.dumps(sign_command)}")

          lines = [
              'name = "libemin"',
              'product-name = "Libemin"',
              f"version = {json.dumps(version)}",
              'identifier = "io.github.mattiabonanni.libemin"',
              'publisher = "Mattia Bonanni"',
              'description = "Native desktop helper for booking hours into Libemax"',
              'category = "Productivity"',
              'out-dir = "dist"',
              'binaries-dir = "target/release"',
              '[before-packaging-command]',
              'script = "cargo build --release"',
              f'dir = {json.dumps(os.environ["GITHUB_WORKSPACE"])}',
              'icons = ["assets/icon.png", "assets/icon.ico"]',
              '',
              '[[binaries]]',
              'path = "libemin"',
              'main = true',
              '',
              *windows_lines,
              '',
              '[nsis]',
              'installer-mode = "currentUser"',
              'installer-icon = "assets/icon.ico"',
              'appdata-paths = ["$APPDATA/libemin/libemin"]',
              '',
              '[wix]',
              'languages = ["en-US"]',
              '',
          ]

          config_path = Path(os.environ["GITHUB_WORKSPACE"]) / "packager-ci.toml"
          config_path.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Build Windows packages
        shell: bash
        run: cargo packager --config "$GITHUB_WORKSPACE/packager-ci.toml" --formats "nsis,wix"

      - name: Upload Windows packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          if-no-files-found: error
          path: |
            dist/*.msi
            dist/*setup.exe

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - package-macos
      - package-windows

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-artifacts"
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
